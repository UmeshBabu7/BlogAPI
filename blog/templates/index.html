<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
</head>
<body>
    <h1>{{title}}</h1>

    {% for obj in queryset %}
    <h1>{{obj.title}}</h1>
    <p>{{obj.content}}</p>
    <p>{{obj.updated}}</p>
    <p>{{obj.timestamp}}</p>
    <p>{{obj.id}}</p>

    {% endfor %}
    

</body>
</html>
