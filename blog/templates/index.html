<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
</head>
<body>

    {% for obj in queryset %}
    <a href="{% url 'posts:detail' obj.id %}">{{obj.title}}</a>
    <p>{{obj.content}}</p>
    <p>{{obj.updated}}</p>
    <p>{{obj.timestamp}}</p>
    <p>{{obj.id}}</p>

    {% endfor %}
    

</body>
</html>
