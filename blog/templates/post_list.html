{% extends "base.html" %}
{% block title %}List of posts{% endblock %}

{% block content %}

    {% for obj in queryset %}
    <a href="{% url 'posts:detail' obj.id %}">{{obj.title}}</a>
    <p>{{obj.content}}</p>
    <p>{{obj.updated}}</p>
    <p>{{obj.timestamp}}</p>
    <p>{{obj.id}}</p>

    {% endfor %}

{% endblock %}
